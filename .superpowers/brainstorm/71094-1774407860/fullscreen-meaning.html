<h2>录音开始后 — "全屏"意味着什么？</h2>
<p class="subtitle">你提到录音后"默认进入全屏"，我想确认这个交互的细节</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>留在 MeetingDetail，但沉浸化</h3>
      <p>不跳转页面。隐藏导航栏和多余 chrome，让笔记区 + 底部录音栏占据全部视野。用户始终在同一个界面，只是进入了"录音模式"。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>跳转到独立的全屏录音页</h3>
      <p>点击录音后 push 一个全新的全屏页面，专门为录音体验设计。结束后自动返回 MeetingDetail。类似相机 app 的体验。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>Sheet/半屏覆盖（类 Granola）</h3>
      <p>从底部弹出一个 sheet，覆盖大部分屏幕，但保留顶部一点点父页面的感知。可以下拉关闭或最小化。</p>
    </div>
  </div>
</div>
