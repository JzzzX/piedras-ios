<h2>顶部录音指示器 — 红点 + REC 标识风格</h2>
<p class="subtitle">给红点加文字标识，提升辨识度</p>

<div class="cards">
  <div class="card" data-choice="rec-mono" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#EAE3D2;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;font-family:system-ui;">
      <div style="border:1px solid #8A7E6B;padding:6px 10px;background:#F4F0E6;font-size:14px;font-weight:bold;">←</div>
      <div style="display:flex;align-items:center;gap:5px;">
        <span style="width:7px;height:7px;border-radius:50%;background:#D9423E;display:inline-block;"></span>
        <span style="font-family:monospace;font-size:11px;font-weight:bold;color:#D9423E;letter-spacing:1px;">REC</span>
      </div>
      <div style="border:1px solid #8A7E6B;padding:6px 10px;background:#F4F0E6;font-size:12px;">⋯</div>
    </div>
    <div class="card-body">
      <h3>A: ● REC</h3>
      <p>经典红点 + 等宽 REC 文字，录像机风格</p>
    </div>
  </div>

  <div class="card" data-choice="rec-badge" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#EAE3D2;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;font-family:system-ui;">
      <div style="border:1px solid #8A7E6B;padding:6px 10px;background:#F4F0E6;font-size:14px;font-weight:bold;">←</div>
      <div style="display:flex;align-items:center;">
        <span style="font-family:monospace;font-size:10px;font-weight:bold;color:#D9423E;letter-spacing:1.5px;border:1px solid rgba(217,66,62,0.3);padding:3px 8px;">● REC</span>
      </div>
      <div style="border:1px solid #8A7E6B;padding:6px 10px;background:#F4F0E6;font-size:12px;">⋯</div>
    </div>
    <div class="card-body">
      <h3>B: [● REC] 徽章</h3>
      <p>红色边框包裹，小徽章/印章风格，与 retro 美学一致</p>
    </div>
  </div>

  <div class="card" data-choice="rec-pill" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#EAE3D2;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;font-family:system-ui;">
      <div style="border:1px solid #8A7E6B;padding:6px 10px;background:#F4F0E6;font-size:14px;font-weight:bold;">←</div>
      <div style="display:flex;align-items:center;">
        <span style="font-family:monospace;font-size:10px;font-weight:bold;color:#F4F0E6;letter-spacing:1.5px;background:#D9423E;padding:3px 10px;border:1px solid #111;">● REC</span>
      </div>
      <div style="border:1px solid #8A7E6B;padding:6px 10px;background:#F4F0E6;font-size:12px;">⋯</div>
    </div>
    <div class="card-body">
      <h3>C: 实底 ● REC</h3>
      <p>红底白字填充，视觉权重更高，一眼看到录音状态</p>
    </div>
  </div>

  <div class="card" data-choice="rec-minimal" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#EAE3D2;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;font-family:system-ui;">
      <div style="border:1px solid #8A7E6B;padding:6px 10px;background:#F4F0E6;font-size:14px;font-weight:bold;">←</div>
      <div style="display:flex;align-items:center;gap:4px;">
        <span style="width:6px;height:6px;border-radius:50%;background:#D9423E;display:inline-block;"></span>
        <span style="font-family:monospace;font-size:10px;color:#8A7E6B;letter-spacing:0.5px;">REC</span>
      </div>
      <div style="border:1px solid #8A7E6B;padding:6px 10px;background:#F4F0E6;font-size:12px;">⋯</div>
    </div>
    <div class="card-body">
      <h3>D: ● <span style="color:#8A7E6B">REC</span></h3>
      <p>红点 + 灰色 REC 文字，低调但有信息量，不抢笔记区视觉焦点</p>
    </div>
  </div>
</div>
