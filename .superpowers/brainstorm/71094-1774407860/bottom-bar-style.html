<h2>底部录音控制栏 — 风格与信息密度</h2>
<p class="subtitle">这个栏是录音过程中用户持续面对的核心控件</p>

<div class="split">
  <div class="mockup" data-choice="minimal" onclick="toggleSelect(this)">
    <div class="mockup-header">极简型：按钮 + 时间</div>
    <div class="mockup-body" style="background:#EAE3D2;padding:0;font-family:system-ui;color:#111;">
      <!-- Bottom bar mockup -->
      <div style="padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border:1px solid #8A7E6B;background:#F4F0E6;margin:16px;">
        <div style="border:1px solid #8A7E6B;padding:8px 24px;font-family:monospace;font-weight:bold;font-size:14px;">⏸ 暂停</div>
        <div style="font-family:monospace;font-size:15px;color:#8A7E6B;">
          04:20
        </div>
        <div style="background:#D9423E;color:white;padding:8px 24px;font-weight:bold;font-size:14px;border:2px solid #111;">结束</div>
      </div>
      <div style="text-align:center;color:#8A7E6B;font-size:12px;padding-bottom:12px;">类 Granola，极度克制</div>
    </div>
  </div>

  <div class="mockup" data-choice="rich" onclick="toggleSelect(this)">
    <div class="mockup-header">丰富型：按钮 + 时间 + 波形 + 转写入口</div>
    <div class="mockup-body" style="background:#EAE3D2;padding:0;font-family:system-ui;color:#111;">
      <div style="padding:12px 16px;border:1px solid #8A7E6B;background:#F4F0E6;margin:16px;">
        <!-- Top row: transcript hint -->
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:6px 10px;background:rgba(138,126,107,0.08);font-size:12px;color:#8A7E6B;border:1px solid rgba(138,126,107,0.15);">
          ≡ &nbsp;实时转写
          <span style="flex:1;"></span>
          <span style="font-size:11px;">▸</span>
        </div>
        <!-- Bottom row: controls -->
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div style="border:1px solid #8A7E6B;padding:8px 20px;font-family:monospace;font-weight:bold;font-size:14px;">⏸</div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-family:monospace;font-size:15px;">04:20</span>
            <div style="display:flex;gap:2px;align-items:end;">
              <div style="width:2px;height:6px;background:#D9423E;opacity:0.4;"></div>
              <div style="width:2px;height:10px;background:#D9423E;opacity:0.6;"></div>
              <div style="width:2px;height:14px;background:#D9423E;opacity:0.8;"></div>
              <div style="width:2px;height:8px;background:#D9423E;opacity:0.5;"></div>
              <div style="width:2px;height:4px;background:#D9423E;opacity:0.3;"></div>
            </div>
          </div>
          <div style="background:#D9423E;color:white;padding:8px 20px;font-weight:bold;font-size:14px;border:2px solid #111;">■ 结束</div>
        </div>
      </div>
      <div style="text-align:center;color:#8A7E6B;font-size:12px;padding-bottom:12px;">信息更丰富，转写入口集成在底栏</div>
    </div>
  </div>
</div>
